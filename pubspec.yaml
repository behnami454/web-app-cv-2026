name: behnam_portfolio
description: Flutter Web portfolio showcasing enterprise mobile and web projects built with clean architecture and scalable solutions.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  get_it: ^9.2.0
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  font_awesome_flutter: ^10.7.0
  go_router: ^14.6.2
  package_info_plus: ^8.1.0
  url_launcher: ^6.3.1

  flutter_localizations:
    sdk: flutter
  flutter_html: ^3.0.0-beta.2

  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  intl_utils: ^2.8.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/cv/
    - assets/data/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/InterVariable.ttf

intl_utils:
  input_directory: "lib/l10n"
  output_directory: "lib/generated"
  locale_list: [ "en", "de", "fr", "es", "it", "ru", "tr", "pl", "nl", "ro" ]
  fallback_locale: "en"
  synthetic_package: true